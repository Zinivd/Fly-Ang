<div class="body-head mb-4">
    <h5 class="mb-2 text-main">Wishlist</h5>
    <h6 class="mb-0">Add or remove items from your wishlist.</h6>
</div>

<div class="text-center py-5" *ngIf="loading">
    <div class="spinner-border text-main"></div>
    <h6 class="mt-3">Loading Wishlist...</h6>
</div>

<div *ngIf="!loading">
    <div class="wishlist-product-grid" *ngIf="products.length > 0; else emptyWishlist">
        <div class="product-box-wrapper" *ngFor="let item of products">
            <app-products [product]="item"></app-products>
            <button class="remove-btn" (click)="removeFromWishlist(item.id)" title="Remove from Wishlist">
                <i class="fas fa-xmark"></i>
            </button>
        </div>
    </div>
</div>

<ng-template #emptyWishlist>
    <div class="text-center text-muted py-5">
        <i class="fas fa-heart fa-2x mb-3"></i>
        <p class="mb-0">Your wishlist is empty.</p>
    </div>
</ng-template>
