<div class="reel-box" [id]="reel.id">
    <div class="reel-img">
        <video
            #reelVideo
            [src]="reel.video_url"
            [muted]="isMuted"
            playsinline
            preload="metadata"
            (ended)="onEnded()"
        ></video>
        <div class="reel-overlay"></div>
        <div class="reel-logo">
            <img src="assets/images/Logo-White.png">
        </div>

        <button class="sound-btn" (click)="toggleMute($event)" type="button">
            <svg *ngIf="isMuted" viewBox="0 0 640 640" class="icon-muted">
                <path d="M320 96C320 86.1 314.1 77.2 305 73.4C295.9 69.6 285.5 71.6 278.5 78.5L166.1 192L64 192C46.3 192 32 206.3 32 224L32 416C32 433.7 46.3 448 64 448L166.1 448L278.6 561.5C285.6 568.5 296 570.4 305.1 566.6C314.2 562.8 320.1 553.9 320.1 544L320.1 96zM480.6 234.6C470.2 224.2 453.3 224.2 442.9 234.6C432.5 245 432.5 261.9 442.9 272.3L490.6 320L442.9 367.7C432.5 378.1 432.5 395 442.9 405.4C453.3 415.8 470.2 415.8 480.6 405.4L528.3 357.7L576 405.4C586.4 415.8 603.3 415.8 613.7 405.4C624.1 395 624.1 378.1 613.7 367.7L566 320L613.7 272.3C624.1 261.9 624.1 245 613.7 234.6C603.3 224.2 586.4 224.2 576 234.6L528.3 282.3L480.6 234.6z"/>
            </svg>
            <svg *ngIf="!isMuted" viewBox="0 0 640 640" class="icon-unmuted">
                <path d="M320 96C320 86.1 314.1 77.2 305 73.4C295.9 69.6 285.5 71.6 278.5 78.5L166.1 192L64 192C46.3 192 32 206.3 32 224L32 416C32 433.7 46.3 448 64 448L166.1 448L278.6 561.5C285.6 568.5 296 570.4 305.1 566.6C314.2 562.8 320.1 553.9 320.1 544L320.1 96zM412.6 181.9C401.4 189.4 398.4 204.6 405.9 215.8C422.5 240.6 432 270.2 432 302C432 333.8 422.5 363.3 405.9 388.2C398.4 399.4 401.4 414.6 412.6 422.1C423.8 429.6 439 426.6 446.5 415.4C467.4 384.1 480 346.4 480 306C480 265.6 467.4 227.9 446.5 196.6C439 185.4 423.8 182.4 412.6 189.9L412.6 181.9z"/>
            </svg>
        </button>

        <h6 class="mb-0">
            {{ reel.title }}
        </h6>
    </div>
</div>
