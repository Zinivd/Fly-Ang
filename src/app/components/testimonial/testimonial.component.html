<div class="text-center py-4" *ngIf="isLoading">
    <div class="spinner-border text-main"></div>
</div>

<div class="carousel-wrap" *ngIf="!isLoading && currentReview">
    <button class="nav-btn nav-prev" (click)="prev()" aria-label="Previous review" *ngIf="reviews.length > 1">
        <i class="fas fa-angle-left"></i>
    </button>

    <div class="carousel-track">
        <div class="testimonial-box">
            <h5>{{ currentReview.title }}</h5>
            <h6>{{ currentReview.body }}</h6>

            <div class="stars">
                <span *ngFor="let filled of starArray">
                    <i *ngIf="filled" class="fa-solid fa-star"></i>
                    <i *ngIf="!filled" class="fa-regular fa-star"></i>
                </span>
            </div>

            <h6 class="reviewer">
                - {{ currentReview.reviewer }}
            </h6>
        </div>
    </div>

    <button class="nav-btn nav-next" (click)="next()" aria-label="Next review" *ngIf="reviews.length > 1">
        <i class="fas fa-angle-right"></i>
    </button>
</div>

<div class="text-center text-muted py-4" *ngIf="!isLoading && !reviews.length">
    <i class="fas fa-star fa-2x mb-3"></i>
    <p>No Customer Reviews Yet.</p>
</div>
